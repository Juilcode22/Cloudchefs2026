<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/financeiro.css">
    <title>Financeiro - Cloud Chefs</title>
    <style>
        /* Estilos específicos para impressão (oculta filtros, botões e cabeçalho ao imprimir) */
        @media print {
            /* Oculta topo, filtros, botões, mensagens */
            .topo, .filtro, .btn-exportar, #global-message-container, .tabela-container thead th:first-child, .tabela-container tbody td:first-child {
                display: none !important;
            }
            .container {
                border: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            table {
                font-size: 10pt;
                width: 100%;
            }
            /* Exibir apenas o que deve ser impresso */
            body {
                background-color: white;
            }
        }
    </style>
</head>
<body onload="verificarAcesso('Financeiro')">
    <header class="topo">
    <a href="#" onclick="history.back()" class="btn-voltar-topo">← Voltar</a>
    <img src="img/logo.png" alt="Logo Cloud Chefs" class="logo-topo">
    <h1>Financeiro</h1>
</header>

    <div class="container">
        <div class="filtro">
            <p class="titulo-filtro">Filtros:</p>
            
            <div class="campos-filtro">
                <div class="linha-filtro">
                    
                    <div class="item-filtro">
                        <label for="forma-pagamento">Forma de Pagamento:</label>
                        <select class="input input-select" id="forma-pagamento">
                            <option value="">TODAS</option>
                            <option value="Dinheiro">Dinheiro</option>
                            <option value="Debito">Débito</option>
                            <option value="Credito">Crédito</option>
                            <option value="PIX">PIX</option>
                        </select>
                    </div>

                    <div class="item-filtro">
                        <label for="data-inicio">Data Início:</label>
                        <input class="input input-date" type="date" id="data-inicio"> 
                    </div>
                    <div class="item-filtro">
                        <label for="data-fim">Data Fim:</label>
                        <input class="input input-date" type="date" id="data-fim">
                    </div>

                    <div class="botoes-acao">
                        <button class="btn-acao btn-limpar" onclick="limparFiltros()">LIMPAR</button>
                        <button class="btn-acao btn-consultar" onclick="consultarPedidos()">CONSULTAR</button>
                    </div>
                </div>
            </div>
        </div>
        
        <button class="btn-exportar" onclick="exportarPDF()">EXPORTAR PDF</button>

        <div class="tabela-container">
            <table>
                <thead>
                    <tr>
                        <th>Nº PEDIDO</th>
                        <th>FORMA DE PAGAMENTO</th>
                        <th>DATA ABERTURA</th>
                        <th>CLIENTE</th>
                        <th>TOTAL</th>
                    </tr>
                </thead>
                <tbody id="tabela-body">
                    </tbody>
            </table>
        </div>

    </div>
    
    <div id="global-message-container"></div>
    <script src="js/auth.js"></script>
    <script src="js/pedidos.js"></script> 
    <script>
        // Garante o acesso à página
        document.addEventListener('DOMContentLoaded', () => {
            // Verifica o acesso à página (definido em auth.js)
            verificarAcessoPagina('Financeiro');
            // Carrega a tabela inicial ao carregar a página
            carregarTabela(carregarPedidos());
        });

        // Função para formatar o total
        function formatarMoeda(valor) {
            return `R$ ${parseFloat(valor).toFixed(2).replace('.', ',')}`;
        }
        
        // ------------------------------------------------
        // 1. Lógica de Consulta (Filtro)
        // ------------------------------------------------

        function consultarPedidos() {
            // carregarPedidos() é carregado do js/pedidos.js
            const todosPedidos = carregarPedidos(); 
            const formaPagamento = document.getElementById('forma-pagamento').value;
            const dataInicioStr = document.getElementById('data-inicio').value;
            const dataFimStr = document.getElementById('data-fim').value;

            // Cria objetos Date para comparação de filtro
            const dataInicioFiltro = dataInicioStr ? new Date(dataInicioStr + 'T00:00:00') : null;
            const dataFimFiltro = dataFimStr ? new Date(dataFimStr + 'T23:59:59') : null;

            const pedidosFiltrados = todosPedidos.filter(pedido => {
                // Filtro 1: Forma de Pagamento
                // Adiciona uma verificação para pedidos mais antigos que não têm formaPagamento
                if (formaPagamento && (!pedido.formaPagamento || pedido.formaPagamento !== formaPagamento)) {
                    return false;
                }

                // Filtro 2 & 3: Datas
                if (pedido.data) {
                    // Converte a data do pedido (DD/MM/AAAA) para Date Object para comparação
                    const [dia, mes, ano] = pedido.data.split('/');
                    const dataPedido = new Date(`${ano}-${mes}-${dia}T12:00:00`);

                    if (dataInicioFiltro && dataPedido < dataInicioFiltro) {
                        return false;
                    }
                    if (dataFimFiltro && dataPedido > dataFimFiltro) {
                        return false;
                    }
                }
                
                return true;
            });
            
            carregarTabela(pedidosFiltrados);
            exibirMensagem(`Consulta finalizada. ${pedidosFiltrados.length} pedidos encontrados.`, 'sucesso');
        }

        // ------------------------------------------------
        // 2. Lógica de Renderização da Tabela
        // ------------------------------------------------

        function carregarTabela(pedidos) {
            const tabelaBody = document.getElementById('tabela-body');
            tabelaBody.innerHTML = ''; // Limpa a tabela

            if (pedidos.length === 0) {
                 tabelaBody.innerHTML = '<tr><td colspan="5">Nenhum pedido encontrado.</td></tr>';
                 return;
            }

            pedidos.forEach(pedido => {
                const row = tabelaBody.insertRow();
                
                // Coluna 1: Nº PEDIDO (Usa numPedido se existir, senão N/A para pedidos antigos)
                row.insertCell().textContent = pedido.numPedido || 'N/A'; 
                
                // Coluna 2: FORMA DE PAGAMENTO (Usa formaPagamento se existir, senão N/A para pedidos antigos)
                row.insertCell().textContent = pedido.formaPagamento || 'N/A';
                
                // Coluna 3: DATA ABERTURA (ou DATA)
                row.insertCell().textContent = pedido.data || 'N/A';
                
                // Coluna 4: CLIENTE
                row.insertCell().textContent = pedido.nomeCliente || '';
                
                // Coluna 5: TOTAL
                row.insertCell().textContent = formatarMoeda(pedido.total);
            });
        }
        
        // ------------------------------------------------
        // 3. Lógica de Exportação e Limpeza
        // ------------------------------------------------

        function exportarPDF() {
             // Simula a exportação de PDF usando a função de impressão do navegador (requisito do usuário)
             window.print();
             exibirMensagem("Preparando impressão do relatório financeiro...", 'alerta');
        }

        function limparFiltros() {
            document.getElementById('forma-pagamento').value = "";
            document.getElementById('data-inicio').value = "";
            document.getElementById('data-fim').value = "";
            
            // Recarrega todos os pedidos
            carregarTabela(carregarPedidos());
            exibirMensagem('Filtros limpos.', 'alerta');
        }
    </script>
</body>
</html>
