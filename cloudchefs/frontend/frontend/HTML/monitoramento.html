<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Chefs - Monitoramento</title>
    <link rel="stylesheet" href="css/monitoramento.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Estilos para impressão (oculta elementos não essenciais) */
        @media print {

            .topo,
            .coluna-esquerda,
            .coluna-direita,
            .btn-exportar,
            .btn-adicionar-pedido,
            .btn-excluir-pedido,
            #global-message-container {
                display: none !important;
            }

            body {
                background-color: white;
            }

            .container {
                padding: 0;
                margin: 0;
                display: block;
            }

            .coluna-central {
                width: 100% !important;
                max-width: 100% !important;
                box-shadow: none;
                border: none;
            }

            .header-coluna {
                border-bottom: none;
            }
        }
    </style>
</head>

<body onload="verificarAcesso('Início')">
    <header class="topo">
        <img src="img/logo.png" alt="Logo Cloud Chefs" class="logo-topo">
        <h1>Monitoramento</h1>
    </header>

    <div class="container">
        <div class="coluna-esquerda" id="sidebar-menu">
            <a href="relatorio.html" data-acesso="Relatórios">
                <button class="btn-esquerda">Relatórios</button>
            </a>
            <a href="pedidos.html" data-acesso="Novo Pedido">
                <button class="btn-esquerda">Novo pedido</button>
            </a>
            <a href="colaboradores.html" data-acesso="Colaboradores">
                <button class="btn-esquerda">Colaboradores</button>
            </a>
            <a href="financeiro.html" data-acesso="Financeiro">
                <button class="btn-esquerda">Financeiro</button>
            </a>
            <a href="atualizacao_estoque.html" data-acesso="Atualização de estoque">
                <button class="btn-esquerda">Atualização de estoque</button>
            </a>
            <button class="btn-esquerda" onclick="fazerLogout()">Sair</button>
        </div>

        <div class="coluna-central">
            <div class="header-coluna">
                <h2 class="titulo-coluna-central">Pedidos</h2>
                <a href="pedidos.html">
                    <button class="btn-adicionar-pedido"><span>+</span> Adicionar</button>
                </a>
            </div>

            <div class="lista-pedidos" id="listaPedidosMonitoramento">
            </div>

            <button class="btn-exportar" onclick="window.print()">EXPORTAR</button>
        </div>

        <div class="coluna-direita">
            <h2 class="titulo-coluna-direita">Estoque<span class="estoque-alerta" id="alertaEstoque">0</span></h2>

            <div class="lista-estoque" id="listaEstoqueMonitoramento">
            </div>
        </div>
    </div>

    <div id="confirmacaoModal" class="modal-overlay">
        <div class="modal-dialog">
            <h3 class="modal-title">Confirmar Exclusão</h3>
            <p id="modal-mensagem" class="modal-body"></p>
            <div class="modal-actions">
                <button class="btn-secundario" onclick="fecharConfirmacao(true)">CANCELAR</button>
                <button class="btn-primario" id="btnConfirmarExclusao" onclick="finalizarExclusao()">EXCLUIR</button>
            </div>
        </div>
    </div>

    <div id="global-message-container"></div>
    <script src="js/auth.js"></script>
    <script src="js/pedidos.js"></script>
    <script src="js/estoque.js"></script>
    <script>

        // Variável global para armazenar o pedido a ser excluído
        let pedidoParaExcluir = null;

        function verificarAcesso(nomePagina) {
            verificarAcessoPagina(nomePagina);
            filtrarMenuLateral();
            carregarMonitoramento();
        }

        // Função para filtrar o menu lateral com base nas permissões
        function filtrarMenuLateral() {
            const menu = document.getElementById('sidebar-menu');
            const links = menu.querySelectorAll('a[data-acesso]');

            links.forEach(link => {
                const recurso = link.getAttribute('data-acesso');
                if (!verificarPermissao(recurso)) {
                    link.style.display = 'none';
                } else {
                    link.style.display = 'block';
                }
            });
        }

        // Funções de Pedidos/Estoque (carregarEstoqueMonitoramento mantida)

        function carregarEstoqueMonitoramento() {
            const estoque = carregarEstoque();
            const listaHtml = document.getElementById('listaEstoqueMonitoramento');
            const alertaSpan = document.getElementById('alertaEstoque');

            listaHtml.innerHTML = '';
            let itensBaixo = 0;

            estoque.forEach(item => {
                const porcentagem = Math.min(item.quantidade, 100);
                const classificacao = getClassificacaoEstoque(item.quantidade);

                // Contagem de itens com estoque baixo (Vermelho e Amarelo)
                if (classificacao === 'baixo' || classificacao === 'medio') {
                    itensBaixo++;
                }

                const barraHtml = `
                    <div class="estoque-item">
                        <p class="nome-ingrediente">${item.nome}</p>
                        <div class="barra-estoque-container">
                            <div class="barra-estoque ${classificacao}" style="width: ${porcentagem}%;"></div>
                            <span class="quantidade-estoque">${item.quantidade}</span>
                        </div>
                    </div>
                `;
                listaHtml.innerHTML += barraHtml;
            });

            alertaSpan.textContent = itensBaixo;
        }

        async function carregarPedidosMonitoramento() {
            const listaHtml = document.getElementById('listaPedidosMonitoramento');
            listaHtml.innerHTML = "<p>🔄 Carregando pedidos do banco...</p>";

            try {
                const resposta = await fetch("http://localhost/cloudchefs/backend/listar_pedidos.php");

                if (!resposta.ok) throw new Error("Erro HTTP: " + resposta.status);

                const pedidos = await resposta.json();
                listaHtml.innerHTML = "";

                if (!Array.isArray(pedidos) || pedidos.length === 0) {
                    listaHtml.innerHTML = "<p>Nenhum pedido encontrado no banco.</p>";
                    return;
                }

                pedidos.reverse().forEach(pedido => {
                    const itensHtml = pedido.itens
                        ? pedido.itens.map(i => `<p>${i.quantidade}x ${i.nome_produto}</p>`).join('')
                        : "";

                    const pedidoHtml = `
                <div class="pedido-item" data-id="${pedido.id_pedido}">
                    <div class="pedido-header">
                        <h3 class="nome-cliente">Nº${String(pedido.id_pedido).padStart(5, '0')} - ${pedido.nome_cliente}</h3>
                        <button class="btn-excluir-pedido" onclick="confirmarExclusao('${pedido.id_pedido}')">
                            <i class="fas fa-trash-alt"></i> Excluir
                        </button>
                    </div>
                    ${itensHtml}
                    <p><strong>Pagamento:</strong> ${pedido.forma_pagamento}</p>
                    <p><strong>Total:</strong> R$ ${Number(pedido.valor_total).toFixed(2).replace('.', ',')}</p>
                    <small>${new Date(pedido.data_pedido).toLocaleString('pt-BR')}</small>
                </div>
            `;
                    listaHtml.innerHTML += pedidoHtml;
                });

                console.log("✅ Pedidos carregados do banco:", pedidos);
            } catch (err) {
                console.error("❌ Erro ao buscar pedidos:", err);
                listaHtml.innerHTML = "<p style='color:red;'>Erro ao carregar pedidos. Verifique o servidor.</p>";
            }
        }


        /**
         * Mostra o modal de confirmação.
         * @param {string} numPedido O número do pedido (ou ID temporário).
         */
        function mostrarConfirmacao(numPedido) {
            if (numPedido.startsWith('idx-')) {
                exibirMensagem(`Não é possível excluir pedidos antigos sem número, recarregue a página para atualizar.`, 'alerta');
                return;
            }

            pedidoParaExcluir = numPedido;

            const modal = document.getElementById('confirmacaoModal');
            const mensagem = document.getElementById('modal-mensagem');

            mensagem.innerHTML = `Tem certeza que deseja excluir o <strong>${numPedido}</strong>? Esta ação é irreversível.`;
            modal.style.display = 'flex'; // Exibe o modal
        }

        /**
         * Fecha o modal de confirmação.
         * @param {boolean} isCancel Se a função está sendo chamada por um cancelamento.
         */
        function fecharConfirmacao(isCancel) {
            document.getElementById('confirmacaoModal').style.display = 'none';
            // Se for cancelamento, zera a variável
            if (isCancel) {
                pedidoParaExcluir = null;
            }
        }

        /**
         * Finaliza a exclusão após a confirmação no modal.
         */
        function finalizarExclusao() {
            if (pedidoParaExcluir) {
                if (excluirPedido(pedidoParaExcluir)) {
                    exibirMensagem(`Pedido ${pedidoParaExcluir} excluído com sucesso!`, 'sucesso');

                    // Zera a variável após a exclusão
                    pedidoParaExcluir = null;

                    // Fecha o modal
                    fecharConfirmacao(false);

                    // Recarrega as listas
                    setTimeout(carregarMonitoramento, 50);
                } else {
                    exibirMensagem(`Erro ao excluir pedido ${pedidoParaExcluir}. Não encontrado.`, 'erro');
                    fecharConfirmacao(true); // Fecha e zera se houver erro
                }
            } else {
                fecharConfirmacao(true); // Se chegou aqui sem pedido, zera e fecha
            }
        }

        /**
         * Pede confirmação estilizada antes de excluir o pedido.
         * @param {string} numPedido O número do pedido (ou ID temporário).
         */
        function confirmarExclusao(numPedido) {
            mostrarConfirmacao(numPedido);
        }

        function carregarMonitoramento() {
            carregarEstoqueMonitoramento();
            carregarPedidosMonitoramento();
        }

        function finalizar() {
            // alert('Funcionalidade não implementada.');
        }


        document.addEventListener("DOMContentLoaded", async () => {
            console.log("🔍 Buscando pedidos do banco...");

            const listaHtml = document.getElementById("listaPedidosMonitoramento");

            try {
                const resposta = await fetch("http://localhost/cloudchefs/backend/listar_pedidos.php", {
                    headers: { "Cache-Control": "no-cache" }
                });
                const pedidos = await resposta.json();

                if (!Array.isArray(pedidos)) {
                    console.error("❌ Resposta inesperada:", pedidos);
                    listaHtml.innerHTML = "<p>Erro ao carregar pedidos (resposta inválida).</p>";
                    return;
                }

                console.log("✅ Pedidos carregados do banco:", pedidos);
                listaHtml.innerHTML = ""; // limpa área

                pedidos.forEach(p => {
                    const item = document.createElement("div");
                    item.classList.add("pedido-item");
                    item.innerHTML = `
                <div class="pedido-header">
                    <h3 class="nome-cliente">#${p.id_pedido} - ${p.nome_cliente}</h3>
                    <button class="btn-excluir-pedido"><i class="fas fa-trash-alt"></i> Excluir</button>
                </div>
                <p><strong>Total:</strong> R$ ${Number(p.valor_total).toFixed(2).replace('.', ',')}</p>
                <p><strong>Pagamento:</strong> ${p.forma_pagamento}</p>
                <p><strong>Status:</strong> ${p.status}</p>
                <small>${new Date(p.data_pedido).toLocaleString('pt-BR')}</small>
            `;
                    listaHtml.appendChild(item);
                });

                if (pedidos.length === 0) {
                    listaHtml.innerHTML = "<p>Nenhum pedido encontrado no banco.</p>";
                }

            } catch (err) {
                console.error("⚠️ Erro ao buscar pedidos:", err);
                listaHtml.innerHTML = "<p>Erro ao buscar pedidos. Verifique o servidor PHP.</p>";
            }
        });


    </script>
</body>

</html>
