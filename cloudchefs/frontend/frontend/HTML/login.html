<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Chefs - Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <img src="img/logo.png" alt="Cloud Chefs" class="logo">

        <input type="text" id="nome-usuario" placeholder="Usuário" class="input">
        <input type="password" id="senha-usuario" placeholder="Senha" class="input">
        
        <button class="btn" onclick="fazerLogin()">ENTRAR</button>

        <a href="esqueceusenha.html" class="link">ESQUECEU A SENHA</a>
    </div>
    
    <div id="global-message-container"></div>
    <script src="js/auth.js"></script>
    <script>
        // Se já estiver logado, redireciona para monitoramento
        if (getUsuarioLogado()) {
            window.location.href = 'monitoramento.html';
        }
    </script>
</body>
</html>
