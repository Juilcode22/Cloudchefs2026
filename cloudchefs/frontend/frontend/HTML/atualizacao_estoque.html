<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Chefs - Atualização de Estoque</title>
    <link rel="stylesheet" href="css/atualizacao_estoque.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body onload="carregarItensAtualizacao()">
   <header class="topo">
    <a href="#" onclick="history.back()" class="btn-voltar-topo">← Voltar</a>
    <img src="img/logo.png" alt="Logo Cloud Chefs" class="logo-topo">
    <h1>Atualização de Estoque</h1>
</header>
<a href="#" onclick="history.back()" class="btn-voltar-inferior" style="display: none;">VOLTAR</a>

    <div class="container">
        
        <div class="filtro-area">
            <h2 class="titulo-tela">Atualização de Estoque</h2>
            <input type="text" class="input-busca" id="inputBusca" onkeyup="filtrarEstoque()" placeholder="Pesquisar item (ex: Bacon, Coca-Cola)">
        </div>

        <div class="lista-estoque" id="listaEstoque">
            </div>
        
        <a href="monitoramento.html" class="btn-voltar-inferior">VOLTAR</a>
        
    </div>

    <div id="global-message-container"></div>
    <script src="js/auth.js"></script>
    <script src="js/estoque.js"></script>
    <script>
        
        let estoqueAtual = carregarEstoque(); 

        function carregarItensAtualizacao() {
            const listaHtml = document.getElementById('listaEstoque');
            listaHtml.innerHTML = '';

            estoqueAtual.forEach((item, index) => {
                const itemHtml = `
                    <div class="estoque-item" data-index="${index}">
                        <p class="nome-item">${item.nome} (Estoque atual: ${item.quantidade})</p>
                        <div class="atualizacao-grupo">
                            <button class="btn-remover" onclick="atualizarItemEstoque(${index}, 'remover', this)">Remover</button>
                            <input type="number" class="input-quantidade" value="0" min="0" placeholder="Qtd. p/ Mover" id="qtd-${index}">
                            <button class="btn-atualizar" onclick="atualizarItemEstoque(${index}, 'adicionar', this)">Adicionar</button>
                        </div>
                    </div>
                `;
                listaHtml.innerHTML += itemHtml;
            });
        }
        
        /**
         * Atualiza (adiciona ou remove) a quantidade de um item do estoque.
         * @param {number} index Índice do item no array estoqueAtual.
         * @param {string} operacao 'adicionar' ou 'remover'.
         * @param {HTMLButtonElement} buttonElement O botão clicado (para feedback visual).
         */
        function atualizarItemEstoque(index, operacao, buttonElement) {
            const input = document.getElementById(`qtd-${index}`);
            // Pega o valor inserido (a quantidade A ADICIONAR ou A REMOVER)
            const quantidadeParaMover = parseInt(input.value);
            
            const isAdicionar = operacao === 'adicionar';

            if (isNaN(quantidadeParaMover) || quantidadeParaMover <= 0) {
                exibirMensagem('Por favor, insira uma quantidade válida (> 0).', 'alerta');
                return;
            }

            let novaQuantidadeTotal;
            let acaoTexto;
            
            if (isAdicionar) {
                // Operação de Adicionar
                novaQuantidadeTotal = estoqueAtual[index].quantidade + quantidadeParaMover;
                acaoTexto = 'Adicionado';
            } else {
                // Operação de Remover
                if (estoqueAtual[index].quantidade < quantidadeParaMover) {
                    exibirMensagem(`Não é possível remover ${quantidadeParaMover} de ${estoqueAtual[index].nome}. Estoque insuficiente.`, 'erro');
                    return;
                }
                novaQuantidadeTotal = estoqueAtual[index].quantidade - quantidadeParaMover;
                acaoTexto = 'Removido';
            }

            // 1. Atualiza o objeto no array
            estoqueAtual[index].quantidade = novaQuantidadeTotal;
            
            // 2. Salva o novo estoque no localStorage (SINCRONIZAÇÃO)
            salvarEstoque(estoqueAtual);

            // 3. Feedback visual
            const textoOriginal = buttonElement.textContent;
            buttonElement.textContent = `${acaoTexto}!`;

            // Zera o input de quantidade e atualiza o estoque atual na lista
            input.value = '0'; 
            
            // Atualiza o texto de estoque atual na própria lista
            const nomeItemElement = buttonElement.closest('.estoque-item').querySelector('.nome-item');
            nomeItemElement.textContent = `${estoqueAtual[index].nome} (Estoque atual: ${novaQuantidadeTotal})`;
            
            exibirMensagem(`Estoque de ${estoqueAtual[index].nome} ${acaoTexto.toLowerCase()} com sucesso! Novo total: ${novaQuantidadeTotal}.`, 'sucesso');
            
            // Reverte o botão após 1.5 segundos
            setTimeout(() => {
                buttonElement.textContent = textoOriginal;
            }, 1500);
        }

        function filtrarEstoque() {
            const input = document.getElementById('inputBusca');
            const filtro = input.value.toUpperCase();
            const lista = document.getElementById('listaEstoque');
            const itens = lista.getElementsByClassName('estoque-item');

            for (let i = 0; i < itens.length; i++) {
                const nomeItem = itens[i].getElementsByClassName('nome-item')[0];
                if (nomeItem) {
                    const texto = nomeItem.textContent || nomeItem.innerText;
                    if (texto.toUpperCase().indexOf(filtro) > -1) {
                        itens[i].style.display = 'flex';
                    } else {
                        itens[i].style.display = 'none';
                    }
                }
            }
        }
    </script>
</body>
</html>
