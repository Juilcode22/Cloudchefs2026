<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueceu a Senha?</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Estilos gerais */
        body {
            font-family: Arial, sans-serif;
            background-color: #fff2cc; /* Cor de fundo externa, simulando o ambiente do tablet */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Estilo da área interna (tablet screen) */
        .tablet-screen {
            width: 80%; /* Ajuste conforme necessário */
            max-width: 600px;
            background-color: #ffffe0; /* Amarelo claro, similar ao da imagem */
            padding: 40px 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        /* Título principal */
        .title {
            color: #cc0000; /* Vermelho escuro */
            font-size: 2.2em;
            margin-bottom: 30px;
            font-weight: bold;
        }

        /* Instrução */
        .instruction {
            color: #333;
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* Campo de entrada (simulação do campo de "DIGITE") */
        .input-area {
            margin-bottom: 30px;
        }

        .input-field {
            width: 70%;
            padding: 15px;
            font-size: 1.2em;
            border: 2px solid #cc0000;
            border-radius: 5px;
            text-align: center;
            background-color: white; /* Para destacar que é um campo de input */
            color: #333;
            box-sizing: border-box;
        }

        /* Botão principal (DIGITE - simulando um campo de input visualmente como botão) */
        .btn-main {
            display: inline-block;
            background-color: #cc0000; /* Vermelho escuro */
            color: white;
            padding: 10px 40px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px #990000; /* Sombra para dar profundidade */
            transition: background-color 0.2s;
        }

        .btn-main:hover {
            background-color: #ff0000;
        }

        /* Área dos botões secundários (VOLTAR e AVANÇAR) */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px; /* Espaçamento entre os botões */
        }

        /* Estilo dos botões secundários */
        .btn-secondary {
            background-color: #cc0000; /* Vermelho escuro */
            color: white;
            padding: 8px 30px;
            border-radius: 3px;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            box-shadow: 0 3px #990000;
            transition: background-color 0.2s;
        }

        .btn-secondary:hover {
            background-color: #ff0000;
        }

        /* Usarei a versão mais fiel ao layout da imagem, tratando o "DIGITE" como o campo de entrada estilizado. */
        .input-container {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .text-input {
             /* Estilo visual para a caixa de texto */
            width: 60%;
            height: 40px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
            font-size: 1.2em;
        }

    </style>
</head>
<body>

    <div class="tablet-screen">

        <h1 class="title">ESQUECEU A SENHA?</h1>

        <p class="instruction">INSIRA O TELEFONE OU E-MAIL</p>

        <div class="input-container">
            <input type="text" class="text-input" placeholder="" aria-label="Insira o Telefone ou E-mail">
            </div>

        <div class="action-buttons">
            <a href="login.html">
                <button class="btn-secondary" style="background-color: #cc0000; color: #ffffe0; box-shadow: none; border: 1px solid #cc0000;">VOLTAR</button>
            </a>
            <button class="btn-secondary" onclick="exibirMensagem('O código foi enviado com sucesso!', 'sucesso')" style="background-color: #cc0000; color: #ffffe0; box-shadow: none; border: 1px solid #cc0000;">AVANÇAR</button>
        </div>
    </div>

    <div id="global-message-container"></div>
    <script src="js/auth.js"></script>
</body>
</html>
