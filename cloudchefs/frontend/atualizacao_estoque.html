<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Chefs - Atualização de Estoque</title>
    <link rel="stylesheet" href="css/atualizacao_estoque.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body onload="carregarItensAtualizacao()">
    <header class="topo">
        <a href="#" onclick="history.back()" class="btn-voltar-topo">← Voltar</a>
        <img src="img/logo.png" alt="Logo Cloud Chefs" class="logo-topo">
        <h1>Atualização de Estoque</h1>
    </header>

    <div class="container">

        <div class="filtro-area">
            <h2 class="titulo-tela">Buscar Igrediente</h2>
            <input type="text" class="input-busca" id="inputBusca" onkeyup="filtrarEstoque()"
                placeholder="Pesquisar item (ex: Bacon, Coca-Cola)">
        </div>

        <div class="container-cadastro">
            <div class="cadastro-section">
                <h2 class="titulo-cadastro">Adicionar Novo Ingrediente</h2>
                <div class="cadastro-inputs">
                    <input type="text" id="novo-nome" placeholder="Nome do Ingrediente" class="input-text" required>

                    <select id="nova-unidade" class="input-select" required>
                        <option value="un">Unidade (un)</option>
                        <option value="kg">Quilo (kg)</option>
                        <option value="L">Litro (L)</option>
                    </select>

                    <input type="number" id="qtd-inicial" placeholder="Qtd. Inicial (0)" class="input-text" value="0"
                        min="0">
                </div>
                <button class="btn-adicionar" onclick="adicionarNovoIngrediente()">ADICIONAR</button>
            </div>
        </div>

        <div class="lista-estoque" id="listaEstoque">
        </div>

        <a href="monitoramento.html" class="btn-voltar-inferior">VOLTAR</a>

    </div>

    <div id="global-message-container"></div>
    <script src="js/auth.js"></script>
    <script src="js/estoque.js"></script>
    <script>
        let estoqueAtual = [];

        async function carregarItensAtualizacao() {
            const listaHtml = document.getElementById('listaEstoque');
            listaHtml.innerHTML = '<p>Carregando estoque do banco...</p>';

            estoqueAtual = await carregarEstoque();
            listaHtml.innerHTML = '';

            if (estoqueAtual.length === 0) {
                listaHtml.innerHTML = '<p>Nenhum item de estoque encontrado no banco.</p>';
            }

            estoqueAtual.forEach((item) => {
                const nome = item.nome_item;
                const qtd = item.quantidade_atual;
                const unidade = item.unidade_medida;

                const itemHtml = `
                <div class="estoque-item" data-nome="${nome}">
                    <p class="nome-item">${nome} (Estoque atual: ${qtd} ${unidade})</p>
                    <div class="atualizacao-grupo">
                        <button class="btn-remover" onclick="atualizarItemEstoque('${nome}', 'remover', this, '${unidade}')">Remover</button>
                        <input type="number" class="input-quantidade" value="0" min="0" placeholder="Qtd. p/ Mover" id="qtd-${nome}">
                        <button class="btn-atualizar" onclick="atualizarItemEstoque('${nome}', 'adicionar', this, '${unidade}')">Adicionar</button>
                    </div>
                </div>
            `;
                listaHtml.innerHTML += itemHtml;
            });
        }

        async function atualizarItemEstoque(nome, operacao, buttonElement, unidade) {
            const input = document.getElementById(`qtd-${nome}`);
            const quantidadeParaMover = parseFloat(input.value);

            if (isNaN(quantidadeParaMover) || quantidadeParaMover <= 0) {
                exibirMensagem('Por favor, insira uma quantidade válida (> 0).', 'alerta');
                return;
            }

            if (unidade.toLowerCase() === 'un' && quantidadeParaMover % 1 !== 0) {
                exibirMensagem(`A unidade '${unidade}' só aceita valores inteiros (sem decimais).`, 'erro');
                return;
            }

            const itemDoArray = estoqueAtual.find(i => i.nome_item === nome);
            if (!itemDoArray) return;

            if (operacao === "remover" && parseFloat(itemDoArray.quantidade_atual) < quantidadeParaMover) {
                exibirMensagem(`Não é possível remover ${quantidadeParaMover}. Estoque insuficiente.`, 'erro');
                return;
            }

            buttonElement.disabled = true;
            buttonElement.textContent = '...';

            try {
                const resposta = await fetch("../backend/estoque.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        acao: operacao,
                        nome: nome,
                        quantidade: quantidadeParaMover
                    })
                });
                const data = await resposta.json();

                if (!data.success) {
                    throw new Error(data.error || "Erro desconhecido no servidor.");
                }

                let novaQuantidadeTotal;
                if (operacao === "adicionar") {
                    novaQuantidadeTotal = parseFloat(itemDoArray.quantidade_atual) + quantidadeParaMover;
                    itemDoArray.quantidade_atual = novaQuantidadeTotal;
                } else {
                    novaQuantidadeTotal = parseFloat(itemDoArray.quantidade_atual) - quantidadeParaMover;
                    itemDoArray.quantidade_atual = novaQuantidadeTotal;
                }

                const qtdExibicao = (unidade.toLowerCase() === 'un') ? Math.round(novaQuantidadeTotal) : novaQuantidadeTotal.toFixed(2);

                input.value = '0';
                const nomeItemElement = buttonElement.closest('.estoque-item').querySelector('.nome-item');
                nomeItemElement.textContent = `${nome} (Estoque atual: ${qtdExibicao} ${unidade})`;
                exibirMensagem(`Estoque de ${nome} atualizado! Novo total: ${qtdExibicao}.`, 'sucesso');

            } catch (err) {
                console.error("Erro ao atualizar estoque:", err);
                exibirMensagem(`Erro ao salvar: ${err.message}`, 'erro');
            } finally {
                buttonElement.disabled = false;
                buttonElement.textContent = operacao === 'adicionar' ? 'Adicionar' : 'Remover';
            }
        }

        function filtrarEstoque() {
            const input = document.getElementById('inputBusca');
            const filtro = input.value.toUpperCase();
            const lista = document.getElementById('listaEstoque');
            const itens = lista.getElementsByClassName('estoque-item');

            for (let i = 0; i < itens.length; i++) {
                const nomeItem = itens[i].getElementsByClassName('nome-item')[0];
                if (nomeItem) {
                    const texto = nomeItem.textContent || nomeItem.innerText;
                    if (texto.toUpperCase().indexOf(filtro) > -1) {
                        itens[i].style.display = 'flex';
                    } else {
                        itens[i].style.display = 'none';
                    }
                }
            }
        }

        async function adicionarNovoIngrediente() {
            const nome = document.getElementById('novo-nome').value.trim();
            const unidade = document.getElementById('nova-unidade').value;
            const qtdInicial = parseFloat(document.getElementById('qtd-inicial').value) || 0;
            // ❌ Linha do qtdMinima removida

            if (nome === "") {
                exibirMensagem("O nome do ingrediente é obrigatório.", "alerta");
                return;
            }

            try {
                const resposta = await fetch("../backend/estoque.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        acao: "criar",
                        nome_item: nome,
                        unidade_medida: unidade,
                        quantidade_atual: qtdInicial // <-- Enviando Qtd. Atual
                        // ❌ Linha do quantidade_minima removida
                    })
                });
                const data = await resposta.json();

                if (data.success) {
                    exibirMensagem(`Ingrediente "${nome}" adicionado!`, 'sucesso');
                    document.getElementById('novo-nome').value = '';
                    document.getElementById('qtd-inicial').value = '0';
                    // ❌ Linha do qtd-minima removida
                    carregarItensAtualizacao();
                } else {
                    exibirMensagem(`Erro: ${data.error}`, 'erro');
                }

            } catch (err) {
                console.error("Falha na conexão:", err);
                exibirMensagem("Falha ao comunicar com o servidor.", "erro");
            }
        }
    </script>
</body>

</html>
