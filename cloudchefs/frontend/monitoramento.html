<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Chefs - Monitoramento</title>
    <link rel="stylesheet" href="css/monitoramento.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Estilos para impressão (oculta elementos não essenciais) */
        @media print {

            .topo,
            .coluna-esquerda,
            .coluna-direita,
            .btn-exportar,
            .btn-adicionar-pedido,
            .btn-excluir-pedido,
            #global-message-container {
                display: none !important;
            }

            body {
                background-color: white;
            }

            .container {
                padding: 0;
                margin: 0;
                display: block;
            }

            .coluna-central {
                width: 100% !important;
                max-width: 100% !important;
                box-shadow: none;
                border: none;
            }

            .header-coluna {
                border-bottom: none;
            }
        }
    </style>
</head>

<body onload="verificarAcesso('Início')">
    <header class="topo">
        <img src="img/logo.png" alt="Logo Cloud Chefs" class="logo-topo">
        <h1>Monitoramento</h1>
    </header>

    <div class="container">
        <div class="coluna-esquerda" id="sidebar-menu">
            <a href="relatorio.html" data-acesso="Relatórios">
                <button class="btn-esquerda">Relatórios</button>
            </a>
            <a href="pedidos.html" data-acesso="Novo Pedido">
                <button class="btn-esquerda">Novo pedido</button>
            </a>
            <a href="colaboradores.html" data-acesso="Colaboradores">
                <button class="btn-esquerda">Colaboradores</button>
            </a>
            <a href="financeiro.html" data-acesso="Financeiro">
                <button class="btn-esquerda">Financeiro</button>
            </a>
            <a href="atualizacao_estoque.html" data-acesso="Atualização de estoque">
                <button class="btn-esquerda">Atualização de estoque</button>
            </a>
            <button class="btn-esquerda" onclick="fazerLogout()">Sair</button>
        </div>

        <div class="coluna-central">
            <div class="header-coluna">
                <h2 class="titulo-coluna-central">Pedidos</h2>
                <a href="pedidos.html">
                    <button class="btn-adicionar-pedido"><span>+</span> Adicionar</button>
                </a>
            </div>

            <div class="lista-pedidos" id="listaPedidosMonitoramento">
            </div>

            <button class="btn-exportar" onclick="window.print()">EXPORTAR</button>
        </div>

        <div class="coluna-direita">
            <h2 class="titulo-coluna-direita">Estoque<span class="estoque-alerta" id="alertaEstoque">0</span></h2>

            <div class="lista-estoque" id="listaEstoqueMonitoramento">
            </div>
        </div>
    </div>

    <div id="confirmacaoModal" class="modal-overlay">
        <div class="modal-dialog">
            <h3 class="modal-title">Confirmar Exclusão</h3>
            <p id="modal-mensagem" class="modal-body"></p>
            <div class="modal-actions">
                <button class="btn-secundario" onclick="fecharConfirmacao(true)">CANCELAR</button>
                <button class="btn-primario" id="btnConfirmarExclusao" onclick="finalizarExclusao()">EXCLUIR</button>
            </div>
        </div>
    </div>

    <div id="global-message-container"></div>
    <script src="js/auth.js"></script>
    <script src="js/pedidos.js"></script>
    <script src="js/estoque.js"></script>
    <script>
        let pedidoParaExcluir = null;

        // --- 🚀 CORREÇÃO DE SINTAXE APLICADA AQUI ---
        function verificarAcesso(nomePagina) {
            // --- FIM DA CORREÇÃO ---
            verificarAcessoPagina(nomePagina);
            filtrarMenuLateral();
            carregarMonitoramento();
        }

        function filtrarMenuLateral() {
            const menu = document.getElementById('sidebar-menu');
            const links = menu.querySelectorAll('a[data-acesso]');

            links.forEach(link => {
                const recurso = link.getAttribute('data-acesso');
                if (!verificarPermissao(recurso)) {
                    link.style.display = 'none';
                } else {
                    link.style.display = 'block';
                }
            });
        }

        async function carregarEstoqueMonitoramento() {
            const estoque = await carregarEstoque();
            const listaHtml = document.getElementById('listaEstoqueMonitoramento');
            const alertaSpan = document.getElementById('alertaEstoque');

            listaHtml.innerHTML = '';
            let itensBaixo = 0;

            estoque.forEach(item => {
                const quantidade = parseInt(item.quantidade_atual) || 0;
                const porcentagem = Math.min(quantidade, 100);
                const classificacao = getClassificacaoEstoque(quantidade);

                if (classificacao === 'baixo' || classificacao === 'medio') {
                    itensBaixo++;
                }

                const barraHtml = `
                <div class="estoque-item">
                    <p class="nome-ingrediente">${item.nome_item}</p>
                    <div class="barra-estoque-container">
                        <div class="barra-estoque ${classificacao}" style="width: ${porcentagem}%;"></div>
                        <span class="quantidade-estoque">${quantidade}</span>
                    </div>
                </div>
            `;
                listaHtml.innerHTML += barraHtml;
            });

            alertaSpan.textContent = itensBaixo;
        }

        async function atualizarStatus(idPedido, novoStatus) {
            const selectElement = document.querySelector(`.pedido-item[data-id="${idPedido}"] .status-select`);
            if (selectElement) {
                selectElement.dataset.status = novoStatus;
            }

            try {
                const resposta = await fetch("../backend/atualizar_status.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id_pedido: idPedido, novo_status: novoStatus })
                });
                const data = await resposta.json();

                if (data.success) {
                    // Mensagem de sucesso removida

                    if (novoStatus === 'Concluído') {
                        const pedidoElement = document.querySelector(`.pedido-item[data-id="${idPedido}"]`);
                        if (pedidoElement) {
                            pedidoElement.style.transition = 'opacity 0.5s, transform 0.5s';
                            pedidoElement.style.opacity = 0;
                            pedidoElement.style.transform = 'translateX(-100px)';
                            setTimeout(() => pedidoElement.remove(), 500);
                        }
                    }
                } else {
                    exibirMensagem(`Erro ao atualizar status: ${data.error}`, "erro");
                }
            } catch (err) {
                console.error("Erro ao atualizar status:", err);
                exibirMensagem("Falha na comunicação ao atualizar status.", "erro");
            }
        }

        async function carregarPedidosMonitoramento() {
            const listaHtml = document.getElementById('listaPedidosMonitoramento');
            listaHtml.innerHTML = "<p>🔄 Carregando pedidos pendentes...</p>";

            let resposta;
            let respostaClonada;

            try {
                resposta = await fetch("../backend/listar_pedidos.php", {
                    cache: "no-cache"
                });
                respostaClonada = resposta.clone();

                if (!resposta.ok) {
                    throw new Error(`Erro HTTP: ${resposta.status}`);
                }

                const pedidos = await resposta.json();
                listaHtml.innerHTML = "";

                if (!Array.isArray(pedidos) || pedidos.length === 0) {
                    listaHtml.innerHTML = "<p>Nenhum pedido pendente ou em preparo no momento.</p>";
                    return;
                }

                console.log("✅ Pedidos carregados (com itens):", pedidos);

                pedidos.forEach(pedido => {

                    let itensHtml = '';
                    if (pedido.itens && Array.isArray(pedido.itens)) {
                        itensHtml = pedido.itens.map(item => {
                            return `<p class="item-pedido">${item.quantidade}x ${item.nome_produto}</p>`;
                        }).join('');
                    } else {
                        itensHtml = "<p>Itens não carregados.</p>";
                    }

                    const statusOptions = ['Pendente', 'Em Preparo', 'Concluído'];
                    let statusHtml = `<select class="status-select" data-status="${pedido.status}" onchange="atualizarStatus(${pedido.id_pedido}, this.value)">`;

                    statusOptions.forEach(opt => {
                        const selecionado = (opt === pedido.status) ? 'selected' : '';
                        statusHtml += `<option value="${opt}" ${selecionado}>${opt}</option>`;
                    });
                    statusHtml += '</select>';

                    const pedidoHtml = `
                <div class="pedido-item" data-id="${pedido.id_pedido}">
                    <div class="pedido-header">
                        <h3 class="nome-cliente">Nº${String(pedido.id_pedido).padStart(5, '0')} - ${pedido.nome_cliente}</h3>
                        <button class="btn-excluir-pedido" onclick="confirmarExclusao('${pedido.id_pedido}')">
                            <i class="fas fa-trash-alt"></i> Excluir
                        </button>
                    </div>
                    <div class="pedido-itens-lista">
                        ${itensHtml}
                    </div>
                    <div class="pedido-status-container">
                        ${statusHtml}
                    </div>
                </div>
                `;
                    listaHtml.innerHTML += pedidoHtml;
                });

            } catch (err) {
                console.error("❌ Falha ao processar JSON:", err);
                try {
                    const textoDoErro = await respostaClonada.text();
                    console.error("🚨 RESPOSTA DO SERVIDOR (PROVÁVEL ERRO PHP):", textoDoErro);
                    listaHtml.innerHTML = `<p style='color:red;'>Falha ao ler JSON. Verifique o console (F12).</p><pre>${textoDoErro}</pre>`;
                } catch (e2) {
                    console.error("Erro ao tentar ler a resposta como texto:", e2);
                    listaHtml.innerHTML = "<p style='color:red;'>Erro crítico. Verifique o console (F12).</p>";
                }
            }
        }

        function mostrarConfirmacao(numPedido) {
            pedidoParaExcluir = numPedido;
            const modal = document.getElementById('confirmacaoModal');
            const mensagem = document.getElementById('modal-mensagem');
            mensagem.innerHTML = `Tem certeza que deseja excluir o <strong>Nº${numPedido}</strong>? Esta ação é irreversível.`;
            modal.style.display = 'flex';
        }

        function fecharConfirmacao(isCancel) {
            document.getElementById('confirmacaoModal').style.display = 'none';
            if (isCancel) {
                pedidoParaExcluir = null;
            }
        }

        async function finalizarExclusao() {
            if (!pedidoParaExcluir) {
                fecharConfirmacao(true);
                return;
            }

            const idParaExcluir = pedidoParaExcluir;
            const pedidoElement = document.querySelector(`.pedido-item[data-id="${idParaExcluir}"]`);

            try {
                const resposta = await fetch("../backend/excluir_pedido.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id_pedido: idParaExcluir })
                });
                const data = await resposta.json();

                if (data.success) {
                    exibirMensagem(`Pedido Nº${idParaExcluir} excluído do banco!`, 'sucesso');

                    if (pedidoElement) {
                        pedidoElement.style.transition = 'opacity 0.5s, transform 0.5s';
                        pedidoElement.style.opacity = 0;
                        pedidoElement.style.transform = 'translateX(-100px)';
                        setTimeout(() => pedidoElement.remove(), 500);
                    }
                } else {
                    exibirMensagem(`Erro ao excluir: ${data.error}`, "erro");
                }

            } catch (err) {
                console.error("Falha na conexão ao excluir:", err);
                exibirMensagem("Falha de rede ao tentar excluir.", "erro");
            } finally {
                pedidoParaExcluir = null;
                fecharConfirmacao(false);
            }
        }

        function confirmarExclusao(numPedido) {
            mostrarConfirmacao(numPedido);
        }

        function carregarMonitoramento() {
            carregarEstoqueMonitoramento();
            carregarPedidosMonitoramento();
        }
    </script>
</body>

</html>
