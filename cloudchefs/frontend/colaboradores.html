<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Chefs - Colaboradores</title>
    <link rel="stylesheet" href="css/colaboradores.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <header class="topo">
        <a href="#" onclick="history.back()" class="btn-voltar-topo">← Voltar</a>
        <img src="img/logo.png" alt="Logo Cloud Chefs" class="logo-topo">
        <h1>Colaboradores</h1>
    </header>
    <a href="#" onclick="history.back()" class="btn-voltar-inferior" style="display: none;">VOLTAR</a>

    <div class="container">

        <div class="secao-cadastro">
            <h2>Cadastrar Novo Colaborador</h2>

            <div class="input-group">
                <label for="nome">Primeiro Nome:</label>
                <input type="text" id="nome" class="input-text" placeholder="Ex: João">
            </div>

            <div class="input-group">
                <label for="login">Login de Acesso:</label>
                <input type="text" id="login" class="input-text" placeholder="Ex: joao.silva">
            </div>
            <div class="input-group">
                <label for="senha">Senha:</label>
                <div class="input-wrapper">
                    <input type="password" id="senha" class="input-text" placeholder="Mínimo 4 caracteres">

                    <button class="toggle-senha" id="btn-toggle-senha">
                        <i id="eye-icon-cadastro" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button class="btn-cadastrar" id="btn-cadastrar">CADASTRAR</button>
        </div>

        <div class="secao-permissoes">
            <h2>Permissões de Acesso</h2>
            <table class="tabela-colaboradores">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Senha</th>
                        <th>Permissão</th>
                        <th>Acessos</th>
                    </tr>
                </thead>
                <tbody id="tabela-body">
                </tbody>
            </table>
        </div>

        <a href="monitoramento.html" class="btn-voltar-inferior">VOLTAR</a>

    </div>

    <div id="global-message-container"></div>
    <script src="js/auth.js"></script>
    <script src="js/colaboradores.js"></script>
</body>

</html>
